    disclosure_tier: FREE
    crawl: true
    max_pages: 1200
    # The public API has 699 non-redirect pages.  Its live revision response
    # currently yields 669 documents; the offline audit still records 689
    # readable pages, so this floor prevents a partial crawl without making
    # normal API response variability look like a failed deployment.
