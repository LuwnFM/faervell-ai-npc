name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Compile and import smoke test
        run: |
          python -m compileall -q faervell_npc
          python - <<'PY'
          from faervell_npc.discord_bot import FaervellBot, StrangerCommands
          from faervell_npc.services.characters import CharacterRegistryService
          from faervell_npc.services.presence import PresenceService

          assert FaervellBot
          assert StrangerCommands
          assert CharacterRegistryService
          assert PresenceService
          PY
      - run: ruff check .
      - run: mypy faervell_npc
      - run: pytest -q
      - run: python -m build
