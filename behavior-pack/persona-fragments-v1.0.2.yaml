# Персонажные фрагменты Странника для дополнения коротких
# arrival/identity/greeting-шаблонов. Ключ — profession_mask_id шаблона.
# Неизменные приметы (из чарника, присутствуют во всех фрагментах):
# третий глаз-камень во лбу, светящиеся линии на коже, браслет из тёмных
# пластин на левой руке, спокойный немного утомлённый взгляд.
# Меняются только одежда, инструменты и подача — по маске.

fragments:
  default: |
    Перед вами высокий худощавый мужчина с бледной, почти пепельной кожей.
    По шее и кистям тянутся тонкие светящиеся линии, похожие на трещины с холодным
    бело-голубым светом; в центре лба — гладкий тёмный камень, похожий на закрытый
    третий глаз. На левой руке — браслет из тёмных пластин. Взгляд спокойный,
    немного утомлённый. Говорят, он торгует, водит по старым путям, берёт и даёт
    поручения и знает больше, чем произносит вслух.

  traveler: |
    Дорожный плащ выцвел на плечах, у пояса — свёрнутые карты и фляга.
    Бледная, почти пепельная кожа; по шее и кистям — тонкие светящиеся линии,
    во лбу — гладкий тёмный камень, похожий на закрытый глаз, на левой руке —
    браслет из тёмных пластин. По слухам, этот путник появляется то тут, то там
    без лошади и обоза, торгует припасами и картами, платит за сведения о дорогах
    и берётся передать груз или весть туда, куда другие не дойдут.

  merchant: |
    Поверх практичной одежды — торговая перевязь с весами и счётной книжкой,
    рядом аккуратный тюк с товаром. Кожа бледная, почти пепельная; по шее и кистям
    идут тонкие светящиеся линии, во лбу — гладкий тёмный камень, словно закрытый
    третий глаз, на левой руке — браслет из тёмных пластин. Торгуется спокойно,
    цен с потолка не называет, выкупает найденное и потерянное — но, по слухам,
    никогда не дороже собственной оценки — и всегда готов обменять товар на услугу
    или редкие сведения.

  herbalist: |
    Через плечо — сумка с травами; от одежды пахнет сушёным сбором и смолой.
    Кожа бледная, почти пепельная; по шее и кистям — тонкие светящиеся линии,
    во лбу — гладкий тёмный камень, похожий на закрытый глаз, на левой руке —
    браслет из тёмных пластин. Говорят, этот травник достаёт редкие сборы даже
    зимой, разбирает состав любого зелья по запаху и меняет лекарства на помощь,
    сведения или честную работу.

  artisan: |
    Руки в мелких отметинах работы, у пояса — свёрнутый набор инструментов.
    Кожа бледная, почти пепельная; по шее и кистям — тонкие светящиеся линии,
    во лбу — гладкий тёмный камень, словно закрытый третий глаз, на левой руке —
    браслет из тёмных пластин. По слухам, этот мастер чинит то, что другие
    выбрасывают, находит нужную деталь там, где её быть не может, и берёт плату
    работой за работу — или сведениями о старых мастерских и утерянных вещах.

  guide: |
    Одежда подобрана под дальний переход, у бедра — футляр с картами и компас
    незнакомой работы. Кожа бледная, почти пепельная; по шее и кистям — тонкие
    светящиеся линии, во лбу — гладкий тёмный камень, похожий на закрытый глаз,
    на левой руке — браслет из тёмных пластин. Говорят, этот проводник знает
    тропы, которых нет на картах, чувствует опасность до того, как она покажется,
    и проведёт караван, отряд или одиночку — за плату, услугу или обещание.
