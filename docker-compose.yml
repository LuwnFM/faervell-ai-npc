services:
  postgres:
    image: pgvector/pgvector:pg16
    # The production host has 4 vCPU / 8 GiB RAM. Keep headroom for Docker,
    # Discord gateway bursts and a rollback container.
    cpus: "1.50"
    mem_limit: 2g
    command: ["postgres", "-c", "shared_buffers=512MB", "-c", "max_connections=80"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-faervell}
      POSTGRES_USER: ${POSTGRES_USER:-faervell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-faervell} -d ${POSTGRES_DB:-faervell}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    cpus: "0.50"
    mem_limit: 512m
    command: redis-server --appendonly yes --maxmemory 384mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  app:
    build: .
    cpus: "2.00"
    mem_limit: 3g
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "faervell_npc.main"]
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./behavior-pack:/app/behavior-pack
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

